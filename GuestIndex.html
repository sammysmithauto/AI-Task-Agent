<!DOCTYPE html>
<html lang="en" style="color-scheme: dark;">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shared Tasks</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    :root { color-scheme: dark; } 
    body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; } 
    .font-mono { font-family: 'JetBrains Mono', monospace; }
    
    /* Ensure native date and time input text is visible on all mobile browsers */
    input[type="date"], input[type="time"] {
      color: #a1a1aa; /* text-zinc-400 */
    }
    input[type="date"]::-webkit-calendar-picker-indicator,
    input[type="time"]::-webkit-calendar-picker-indicator {
      filter: invert(1);
      opacity: 0.5;
      cursor: pointer;
    }
  </style>
  <script>tailwind.config = { darkMode: 'class', theme: { extend: {} } }</script>
</head>
<body class="bg-[#0a0a0b] text-white min-h-screen antialiased dark">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    const CURRENT_GUEST_NAME = "<?!= guestName ?>";

    const Icon = ({ name, className }) => {
      const ref = useRef(null);
      useEffect(() => { if (ref.current) lucide.createIcons({ icons: { [name]: lucide.icons[name] }, attrs: { class: className }, nameAttr: 'data-lucide' }); }, [name, className]);
      return <i ref={ref} data-lucide={name} className={className}></i>;
    };

    function TaskItem({ task, onToggle }) {
      const date = task.dueDate ? new Date(task.dueDate).toLocaleDateString('en-GB', { day: '2-digit', month: 'short' }).toUpperCase() : null;
      
      return (
        <li className="group flex items-start gap-4 px-5 py-5 rounded-2xl border border-white/5 bg-[#111113] hover:border-lime-400/20 transition-all">
          <button 
            onClick={() => onToggle(task.id)} 
            title={task.done ? "Completed" : "Mark as Done"}
            className={`mt-0.5 shrink-0 w-[22px] h-[22px] rounded-full border-2 flex items-center justify-center transition-all ${task.done ? 'bg-lime-400 border-lime-400 shadow-[0_0_12px_2px_rgba(132,204,22,0.3)] cursor-default' : 'bg-[#0a0a0b] border-white/10 hover:border-lime-400/50 cursor-pointer'}`}
            disabled={task.done}
          >
            {task.done && <Icon name="check" className="w-3.5 h-3.5 text-zinc-950" />}
          </button>
          
          <div className="min-w-0 flex-1">
            <p className={`text-[15px] font-semibold leading-snug tracking-tight transition-colors ${task.done ? 'text-zinc-600 line-through' : 'text-white'}`}>
              {task.title}
            </p>
            <div className="flex flex-wrap items-center gap-2 mt-3">
              {date && (
                <span className="inline-flex items-center gap-1.5 px-2.5 py-1 bg-lime-400/5 border border-lime-400/20 text-lime-400 font-mono text-[9px] uppercase tracking-wider rounded-md">
                  <Icon name="calendar" className="w-3 h-3 opacity-80" /> {date}
                </span>
              )}
              {task.startTime && (
                <span className="inline-flex items-center gap-1.5 px-2.5 py-1 bg-[#1a1a1c] border border-white/5 text-zinc-300 font-mono text-[9px] uppercase tracking-wider rounded-md">
                  <Icon name="clock" className="w-3 h-3 opacity-70" /> {task.startTime} {task.endTime ? `- ${task.endTime}` : ''}
                </span>
              )}
              <span className="inline-flex items-center gap-1.5 px-2.5 py-1 bg-[#0a0a0b] border border-white/5 text-zinc-400 font-mono text-[9px] uppercase tracking-wider rounded-md">
                <Icon name="user" className="w-3 h-3 opacity-70" /> Added by {task.addedBy.toUpperCase()}
              </span>
              {task.done && task.completedBy && (
                <span className="inline-flex items-center gap-1.5 px-2.5 py-1 bg-lime-400/10 border border-lime-400/20 text-lime-400 font-mono text-[9px] uppercase tracking-wider rounded-md">
                  <Icon name="check-circle-2" className="w-3 h-3 opacity-80" /> Done by {task.completedBy.toUpperCase()}
                </span>
              )}
            </div>
            
            {!task.done && task.clashWarning && (
              <div className="mt-4 px-3.5 py-2.5 bg-red-950/30 border border-red-900/50 rounded-lg flex items-start gap-2.5 text-red-400/90">
                <Icon name="alert-circle" className="w-4 h-4 shrink-0 mt-[2px]" />
                <p className="text-[12px] font-medium leading-relaxed">{task.clashWarning}</p>
              </div>
            )}
          </div>
        </li>
      );
    }

    function App() {
      const [tasks, setTasks] = useState([]);
      const [title, setTitle] = useState('');
      const [dueDate, setDueDate] = useState('');
      const [startTime, setStartTime] = useState('');
      const [endTime, setEndTime] = useState('');
      const [refreshing, setRefreshing] = useState(false);
      const [listName, setListName] = useState('🏠 Family & Home Admin');

      useEffect(() => { 
        fetchTasks(false); 
        const interval = setInterval(() => { fetchTasks(true); }, 15000);
        return () => clearInterval(interval);
      }, []);

      const fetchTasks = (isSilent = false) => {
        if (!isSilent) setRefreshing(true);
        google.script.run.withSuccessHandler(data => {
          if (!data.error) {
            setTasks(data.tasks || []);
            if (data.listName) setListName(data.listName);
          }
          if (!isSilent) setRefreshing(false);
        }).getGuestTasks();
      };

      const handleAdd = (e) => {
        e.preventDefault();
        if (!title.trim()) return;
        
        const taskTitle = title.trim();
        const taskDate = dueDate;
        
        let finalStartTime = startTime;
        let finalEndTime = endTime;
        
        if (finalStartTime && !finalEndTime) {
            let [hours, minutes] = finalStartTime.split(':').map(Number);
            let d = new Date(2000, 0, 1, hours, minutes);
            d.setMinutes(d.getMinutes() + 30);
            finalEndTime = String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
        }
        
        setTitle(''); setDueDate(''); setStartTime(''); setEndTime('');
        
        const tempTask = { 
          id: 'temp-' + Date.now(), 
          title: taskTitle, 
          dueDate: taskDate ? taskDate : null,
          startTime: finalStartTime || null,
          endTime: finalEndTime || null,
          addedBy: CURRENT_GUEST_NAME, 
          updated: new Date().toISOString(), 
          done: false,
          clashWarning: null
        };
        
        setTasks(prev => [tempTask, ...prev]);
        google.script.run.addGuestTask(taskTitle, taskDate, finalStartTime, finalEndTime, CURRENT_GUEST_NAME);
      };

      const handleToggle = (id) => {
        setTasks(prev => prev.map(t => t.id === id ? { ...t, done: true, completedBy: CURRENT_GUEST_NAME } : t));
        google.script.run.completeGuestTask(id, CURRENT_GUEST_NAME);
      };

      const active = tasks.filter(t => !t.done).sort((a, b) => {
        if (!a.dueDate && !b.dueDate) return new Date(b.updated) - new Date(a.updated);
        if (!a.dueDate) return 1; 
        if (!b.dueDate) return -1;

        if (a.dueDate < b.dueDate) return -1;
        if (a.dueDate > b.dueDate) return 1;

        const timeA = a.startTime || "24:00"; 
        const timeB = b.startTime || "24:00";
        if (timeA < timeB) return -1;
        if (timeA > timeB) return 1;
        
        return new Date(b.updated) - new Date(a.updated);
      });
      
      const completed = tasks.filter(t => t.done).sort((a, b) => {
        return new Date(b.updated) - new Date(a.updated);
      });

      return (
        <div className="w-full min-h-screen bg-[#0a0a0b] text-white relative">
          <div className="absolute top-0 left-0 w-full h-[400px] bg-gradient-to-b from-lime-900/10 to-transparent pointer-events-none" />

          <div className="relative max-w-[600px] mx-auto px-4 sm:px-6 py-8 md:py-12">
            
            <header className="flex items-center justify-between gap-4 mb-10">
              <div className="flex items-center gap-4">
                <div className="w-11 h-11 rounded-xl bg-lime-400 flex items-center justify-center shadow-[0_0_20px_rgba(132,204,22,0.2)] text-[22px]">
                  🏠
                </div>
                <div>
                  <span className="text-[17px] font-bold text-white tracking-tight block uppercase">{listName}</span>
                  <div className="text-[13px] text-zinc-500 mt-0.5">Shared list for everyone</div>
                </div>
              </div>
              <div className="flex items-center gap-2 px-4 py-2 rounded-full border border-white/5 bg-[#111113]">
                <span className="w-1.5 h-1.5 rounded-full bg-lime-400 animate-pulse"></span>
                <span className="font-mono text-[9px] uppercase tracking-[0.15em] text-zinc-400">Signed In · <span className="text-lime-400 font-bold">{CURRENT_GUEST_NAME.toUpperCase()}</span></span>
              </div>
            </header>

            <form onSubmit={handleAdd} className="rounded-2xl border border-white/5 bg-[#111113] p-5 md:p-6 mb-10 flex flex-col gap-5">
              
              {/* Row 1: Task Input */}
              <div className="flex flex-col gap-2">
                <label className="font-mono text-[9px] uppercase tracking-[0.2em] font-bold text-zinc-400 ml-1">Task</label>
                <div className="relative">
                  <span className="absolute left-4 top-1/2 -translate-y-1/2 text-lime-400 font-mono text-[14px] leading-none">+</span>
                  <input type="text" value={title} onChange={e => setTitle(e.target.value)} placeholder="Add a task or reminder" className="w-full pl-10 pr-5 py-3.5 bg-[#0a0a0b] border border-white/5 rounded-xl text-[14px] font-medium focus:outline-none focus:border-lime-400/30 text-white placeholder:text-zinc-600 shadow-inner" />
                </div>
              </div>
              
              {/* Row 2: Desktop inline, Mobile stacked */}
              <div className="grid grid-cols-1 md:grid-cols-12 gap-4 items-end">
                
                <div className="md:col-span-4 flex flex-col gap-2">
                  <label className="font-mono text-[9px] uppercase tracking-[0.2em] font-bold text-zinc-400 ml-1">Date</label>
                  <div className="relative">
                    <Icon name="calendar" className="w-4 h-4 text-zinc-600 absolute left-4 top-1/2 -translate-y-1/2 pointer-events-none" />
                    <input type="date" value={dueDate} onChange={e => setDueDate(e.target.value)} className="w-full pl-12 pr-4 py-3 text-[13px] font-mono bg-[#0a0a0b] border border-white/5 rounded-xl text-zinc-400 focus:outline-none focus:border-lime-400/30 uppercase" />
                  </div>
                </div>
                
                <div className="md:col-span-5 grid grid-cols-2 gap-3">
                  <div className="flex flex-col gap-2">
                    <label className="font-mono text-[9px] uppercase tracking-[0.2em] font-bold text-zinc-400 ml-1">Start time</label>
                    <div className="relative">
                      <Icon name="clock" className="w-4 h-4 text-zinc-600 absolute left-4 top-1/2 -translate-y-1/2 pointer-events-none" />
                      <input type="time" value={startTime} onChange={e => setStartTime(e.target.value)} className="w-full pl-10 pr-2 py-3 text-[13px] font-mono bg-[#0a0a0b] border border-white/5 rounded-xl text-zinc-400 focus:outline-none focus:border-lime-400/30" />
                    </div>
                  </div>
                  <div className="flex flex-col gap-2">
                    <label className="font-mono text-[9px] uppercase tracking-[0.2em] font-bold text-zinc-400 ml-1 truncate">End time (optional)</label>
                    <div className="relative">
                      <Icon name="clock" className="w-4 h-4 text-zinc-600 absolute left-4 top-1/2 -translate-y-1/2 pointer-events-none" />
                      <input type="time" value={endTime} onChange={e => setEndTime(e.target.value)} className="w-full pl-10 pr-2 py-3 text-[13px] font-mono bg-[#0a0a0b] border border-white/5 rounded-xl text-zinc-400 focus:outline-none focus:border-lime-400/30" />
                    </div>
                  </div>
                </div>

                <div className="md:col-span-3">
                  <button type="submit" disabled={!title.trim()} className="w-full py-3 bg-[#1a1a1c] border border-white/5 text-zinc-400 font-mono font-bold rounded-xl text-[10px] uppercase tracking-wider hover:bg-white/10 hover:text-white disabled:opacity-30 disabled:pointer-events-none transition-all flex justify-center items-center gap-2">
                    Add Task
                  </button>
                </div>
                
              </div>
            </form>

            <section className="space-y-10">
              <div>
                <div className="flex items-center justify-between px-1 mb-4">
                  <div className="flex items-center gap-2">
                    <span className="w-1.5 h-1.5 rounded-full bg-lime-400" />
                    <h2 className="font-mono text-[10px] uppercase tracking-[0.2em] font-bold text-zinc-300">Active Tasks</h2>
                  </div>
                  <span className="font-mono text-[9px] uppercase tracking-[0.15em] text-zinc-500">{String(active.length).padStart(2, '0')} OPEN</span>
                </div>
                {active.length === 0 ? (
                  <div className="text-center py-12 rounded-2xl border border-dashed border-white/5 bg-[#111113]/50 font-mono text-[10px] uppercase tracking-[0.2em] text-zinc-600">· No tasks outstanding ·</div>
                ) : (
                  <ul className="space-y-3">{active.map(t => <TaskItem key={t.id} task={t} onToggle={handleToggle} />)}</ul>
                )}
              </div>

              {completed.length > 0 && (
                <div>
                  <div className="flex items-center justify-between px-1 mb-4">
                    <div className="flex items-center gap-2">
                      <span className="w-1.5 h-1.5 rounded-full bg-zinc-600" />
                      <h2 className="font-mono text-[10px] uppercase tracking-[0.2em] font-bold text-zinc-500">Completed Tasks</h2>
                    </div>
                    <span className="font-mono text-[9px] uppercase tracking-[0.15em] text-zinc-600">{String(completed.length).padStart(2, '0')} DONE</span>
                  </div>
                  <ul className="space-y-3">{completed.map(t => <TaskItem key={t.id} task={t} onToggle={handleToggle} />)}</ul>
                </div>
              )}
            </section>

            <footer className="mt-16 pt-6 border-t border-white/5 flex items-center justify-between font-mono text-[9px] uppercase tracking-widest text-zinc-600">
              <button onClick={() => fetchTasks(false)} className="inline-flex items-center gap-2 hover:text-lime-400 transition-colors">
                <Icon name="refresh-cw" className={`w-3 h-3 ${refreshing ? 'animate-spin' : ''}`} /> Sync Now
              </button>
              <span>· shared_tasks / live</span>
            </footer>
          </div>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
