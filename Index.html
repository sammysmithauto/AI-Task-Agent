<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Task Agent</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    body { font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
    .font-mono { font-family: 'JetBrains Mono', monospace; }
    .bg-grid-dark { background-image: radial-gradient(rgba(255, 255, 255, 0.04) 1px, transparent 1px); background-size: 24px 24px; }
    @keyframes scan { 0% { transform: translateY(-100%); opacity: 0; } 50% { opacity: 1; } 100% { transform: translateY(400%); opacity: 0; } }
    .animate-scan { animation: scan 3.5s ease-in-out infinite; }
    @keyframes glow-pulse { 0%, 100% { box-shadow: 0 0 30px 4px rgba(132, 204, 22, 0.3); } 50% { box-shadow: 0 0 50px 8px rgba(132, 204, 22, 0.5); } }
    .animate-glow-pulse { animation: glow-pulse 3s ease-in-out infinite; }
    .terminal-scroll::-webkit-scrollbar { width: 4px; }
    .terminal-scroll::-webkit-scrollbar-thumb { background: rgba(132, 204, 22, 0.2); border-radius: 2px; }
    select { -webkit-appearance: none; -moz-appearance: none; appearance: none; }
  </style>
  <script>tailwind.config = { darkMode: 'class', theme: { extend: {} } }</script>
</head>
<body className="bg-[#0a0a0b] text-white min-h-screen antialiased dark">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const Icon = ({ name, className }) => {
      const ref = useRef(null);
      useEffect(() => { if (ref.current) lucide.createIcons({ icons: { [name]: lucide.icons[name] }, attrs: { class: className }, nameAttr: 'data-lucide' }); }, [name, className]);
      return <i ref={ref} data-lucide={name} className={className}></i>;
    };

    function StatGrid({ liveMetrics }) {
      const stats = [
        { label: 'Unsorted Tasks', value: String(liveMetrics.brainDumpCount || '0').padStart(2, '0'), delta: 'In Brain Dump' },
        { label: 'Active Folders', value: String(liveMetrics.listCount || '0').padStart(2, '0'), delta: 'Connected' },
        { label: 'Agent Status', value: liveMetrics.active ? 'Active' : 'Paused', delta: 'System State' },
        { label: 'Avg Cycle Speed', value: '1.2s', delta: 'Optimized' },
      ];
      return (
        <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
          {stats.map(s => (
            <div key={s.label} className="relative overflow-hidden rounded-2xl border border-white/5 bg-[#111113] p-5 md:p-6 min-h-[120px] flex flex-col justify-between">
              <div className="absolute top-5 right-5 font-mono text-[9px] uppercase tracking-widest text-zinc-500">{s.delta}</div>
              <div className="text-4xl md:text-5xl font-extrabold text-white tracking-tight mt-6">{s.value}</div>
              <div className="font-mono text-[9px] uppercase tracking-[0.15em] text-zinc-500 mt-2">{s.label}</div>
            </div>
          ))}
        </div>
      );
    }

    function App() {
      const [activeTab, setActiveTab] = useState('getting-started');
      const [isRunning, setIsRunning] = useState(false);
      const [liveMetrics, setLiveMetrics] = useState({ brainDumpCount: 0, listCount: 0, active: false, lastSync: 'Never', inputList: '🧠 Brain Dump', sharedList: '🏠 Family & Home Admin', allLists: [], country: 'SE' });
      const [logs, setLogs] = useState([{ time: new Date().toLocaleTimeString([], {hour: '2-digit', minute: '2-digit', second: '2-digit'}), text: 'System online. Monitoring workspace structures.', type: 'success' }]);

      const [inputListName, setInputListName] = useState('🧠 Brain Dump');
      const [sharedListName, setSharedListName] = useState('🏠 Family & Home Admin');
      const [countryCode, setCountryCode] = useState('SE');
      const [autopilot, setAutopilot] = useState(true);
      const [guestName, setGuestName] = useState('');
      const [generatedUrl, setGeneratedUrl] = useState('');
      const [copied, setCopied] = useState(false);
      const [saveStatus, setSaveStatus] = useState('idle');

      useEffect(() => {
        refreshMetrics(false);
        const interval = setInterval(() => { refreshMetrics(true); }, 30000);
        return () => clearInterval(interval);
      }, []);

      const refreshMetrics = (isSilent = false) => {
        google.script.run.withSuccessHandler((stats) => {
          setLiveMetrics(stats);
          if (!isSilent) {
            setInputListName(stats.inputList);
            setSharedListName(stats.sharedList);
            setCountryCode(stats.country);
            setAutopilot(stats.active);
          }
        }).getSystemStats();
      };

      const formatTimeAgo = (isoString) => {
        if (!isoString || isoString === 'Never') return 'Never';
        const diff = Math.floor((new Date() - new Date(isoString)) / 60000);
        if (diff < 1) return 'Just now';
        if (diff === 1) return '1 MINUTE AGO';
        if (diff < 60) return `${diff} MINUTES AGO`;
        return new Date(isoString).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}).toUpperCase();
      };

      const handleRun = () => {
        setIsRunning(true);
        setLogs(prev => [...prev, { time: new Date().toLocaleTimeString([], {hour: '2-digit', minute: '2-digit', second: '2-digit'}), text: 'Analyzing workspace routing...', type: 'info' }]);
        
        google.script.run.withSuccessHandler((res) => {
          if (res.logs) {
            res.logs.forEach(l => setLogs(p => [...p, { time: new Date().toLocaleTimeString([], {hour: '2-digit', minute: '2-digit', second: '2-digit'}), text: l, type: 'info' }]));
          }
          setLogs(p => [...p, { time: new Date().toLocaleTimeString([], {hour: '2-digit', minute: '2-digit', second: '2-digit'}), text: res.msg, type: res.status }]);
          setIsRunning(false);
          refreshMetrics(false);
        }).runAiAgent();
      };

      const handleSaveConfig = (e) => {
        e.preventDefault();
        setSaveStatus('saved');
        setLiveMetrics(prev => ({ ...prev, sharedList: sharedListName, inputList: inputListName, country: countryCode }));
        setLogs(p => [...p, { time: new Date().toLocaleTimeString([], {hour: '2-digit', minute: '2-digit', second: '2-digit'}), text: 'Settings saved successfully.', type: 'success' }]);
        
        google.script.run.updateGlobalSettings(inputListName, countryCode, sharedListName);
        setTimeout(() => setSaveStatus('idle'), 2500);
      };

      const handleAutopilotToggle = () => {
        const nextState = !autopilot;
        setAutopilot(nextState);
        setLiveMetrics(prev => ({...prev, active: nextState}));
        setLogs(p => [...p, { time: new Date().toLocaleTimeString([], {hour: '2-digit', minute: '2-digit', second: '2-digit'}), text: nextState ? 'Autopilot turned ON.' : 'Autopilot turned OFF. Manual sorting required.', type: 'warning' }]);
        google.script.run.toggleAutomation(nextState);
      };

      const handleGenerateLink = () => {
        if (!guestName.trim()) return;
        google.script.run.withSuccessHandler((baseUrl) => {
          setGeneratedUrl(`${baseUrl}?portal=family&key=SecretPassword123&name=${encodeURIComponent(guestName.trim())}`);
        }).getAppBaseUrl();
      };

      const handleSetupWorkspace = () => {
        google.script.run.withSuccessHandler((msg) => {
          setLogs(p => [...p, { time: new Date().toLocaleTimeString([], {hour: '2-digit', minute: '2-digit', second: '2-digit'}), text: msg, type: 'success' }]);
          refreshMetrics(false);
        }).setupWorkspace();
      };

      const handleFactoryReset = () => {
        if(confirm("DANGER: Are you absolutely sure you want to clear the AI's memory and turn off autopilot? This will not delete your tasks in Google.")) {
          google.script.run.withSuccessHandler((msg) => {
            setLogs(p => [...p, { time: new Date().toLocaleTimeString([], {hour: '2-digit', minute: '2-digit', second: '2-digit'}), text: msg, type: 'error' }]);
            refreshMetrics(false);
          }).factoryReset();
        }
      };

      return (
        <div className="w-full min-h-screen bg-[#0a0a0b] text-white relative">
          <div className="absolute top-0 left-0 w-full h-[500px] bg-gradient-to-b from-lime-900/10 to-transparent pointer-events-none" />

          <div className="relative max-w-[1000px] mx-auto px-4 sm:px-6 py-8 md:py-12">
            
            <header className="flex items-center gap-4 mb-10">
              <div className="w-10 h-10 rounded-xl bg-lime-400 flex items-center justify-center shadow-[0_0_15px_rgba(132,204,22,0.15)]">
                <span className="font-mono font-extrabold text-zinc-950 text-sm">AI</span>
              </div>
              <div>
                <div className="flex items-center gap-2">
                  <span className="text-base font-bold text-white tracking-tight uppercase">AI TASK AGENT</span>
                  <span className="font-mono text-[9px] text-zinc-500 border border-white/10 rounded px-1.5 py-0.5">v2.0</span>
                </div>
                <div className="text-xs text-zinc-500 mt-0.5">Automate Your Workspace</div>
              </div>
            </header>

            <div className="inline-flex items-center p-1 rounded-full border border-white/5 bg-[#111113] mb-8 overflow-x-auto max-w-full">
              <button onClick={() => setActiveTab('getting-started')} className={`shrink-0 px-6 py-2 rounded-full font-mono text-[10px] uppercase tracking-widest font-bold transition-colors ${activeTab === 'getting-started' ? 'bg-lime-400 text-zinc-950 shadow-sm' : 'text-zinc-500 hover:text-zinc-300'}`}>
                Getting Started
              </button>
              <button onClick={() => setActiveTab('console')} className={`shrink-0 px-6 py-2 rounded-full font-mono text-[10px] uppercase tracking-widest font-bold transition-colors ${activeTab === 'console' ? 'bg-lime-400 text-zinc-950 shadow-sm' : 'text-zinc-500 hover:text-zinc-300'}`}>
                Agent Console
              </button>
              <button onClick={() => setActiveTab('settings')} className={`shrink-0 px-6 py-2 rounded-full font-mono text-[10px] uppercase tracking-widest font-bold transition-colors ${activeTab === 'settings' ? 'bg-lime-400 text-zinc-950 shadow-sm' : 'text-zinc-500 hover:text-zinc-300'}`}>
                Settings
              </button>
            </div>

            {activeTab === 'getting-started' && (
              <div className="space-y-4 animate-fadeIn">
                <div className="rounded-2xl border border-white/5 bg-[#111113] p-6 md:p-8">
                  <h2 className="text-2xl md:text-3xl font-bold text-white tracking-tight mb-2">How to Automate Your Life</h2>
                  <p className="text-[13px] text-zinc-400 mb-8 leading-relaxed max-w-2xl">This agent acts as the bridge between your raw thoughts and your organized Google Workspace. Here is how to use it daily.</p>
                  
                  <div className="space-y-6">
                    <div className="flex gap-4 p-5 rounded-xl border border-white/5 bg-[#0a0a0b]">
                      <div className="w-8 h-8 shrink-0 rounded-full border border-lime-400/40 text-lime-400 flex items-center justify-center font-mono font-bold text-xs bg-lime-400/5">1</div>
                      <div>
                        <h3 className="font-bold text-white text-[15px] mb-1">Dump Your Thoughts (Google Tasks)</h3>
                        <p className="text-[13px] text-zinc-400 leading-relaxed">You no longer need to manually categorize tasks or pick dates. Open your Google Tasks app and type your thoughts into your Input List (default: "🧠 Brain Dump") exactly as they come to you. <br/><span className="italic text-zinc-500">Example: "Call the mechanic next Tuesday" or "Book flights for Midsummer."</span></p>
                      </div>
                    </div>

                    <div className="flex gap-4 p-5 rounded-xl border border-white/5 bg-[#0a0a0b]">
                      <div className="w-8 h-8 shrink-0 rounded-full border border-lime-400/40 text-lime-400 flex items-center justify-center font-mono font-bold text-xs bg-lime-400/5">2</div>
                      <div>
                        <h3 className="font-bold text-white text-[15px] mb-1">Run the Agent (The Smart Sort)</h3>
                        <p className="text-[13px] text-zinc-400 leading-relaxed">The AI checks your Brain Dump first. If it finds tasks, it routes them to the correct folder. If your Brain Dump is empty, it automatically shifts to Deep Clean mode, scanning all your folders to merge duplicates.</p>
                      </div>
                    </div>

                    <div className="flex gap-4 p-5 rounded-xl border border-white/5 bg-[#0a0a0b]">
                      <div className="w-8 h-8 shrink-0 rounded-full border border-lime-400/40 text-lime-400 flex items-center justify-center font-mono font-bold text-xs bg-lime-400/5">3</div>
                      <div>
                        <h3 className="font-bold text-white text-[15px] mb-1">Google Calendar & Deadlines</h3>
                        <p className="text-[13px] text-zinc-400 leading-relaxed">The AI automatically extracts deadlines from your natural language and formats them correctly. Because Google Tasks syncs with Google Calendar, your sorted tasks will now automatically appear on your calendar on the correct days.</p>
                      </div>
                    </div>

                    <div className="flex gap-4 p-5 rounded-xl border border-white/5 bg-[#0a0a0b]">
                      <div className="w-8 h-8 shrink-0 rounded-full border border-lime-400/40 text-lime-400 flex items-center justify-center font-mono font-bold text-xs bg-lime-400/5">4</div>
                      <div>
                        <h3 className="font-bold text-white text-[15px] mb-1">The Background Autopilot</h3>
                        <p className="text-[13px] text-zinc-400 leading-relaxed">Head to the Settings tab and turn on <strong>Background Autopilot</strong>. The AI will silently check your Brain Dump every hour and sort new tasks in the background automatically.</p>
                      </div>
                    </div>

                    <div className="flex gap-4 p-5 rounded-xl border border-white/5 bg-[#0a0a0b]">
                      <div className="w-8 h-8 shrink-0 rounded-full border border-lime-400/40 text-lime-400 flex items-center justify-center font-mono font-bold text-xs bg-lime-400/5">5</div>
                      <div>
                        <h3 className="font-bold text-white text-[15px] mb-1">Family & Guest Sharing</h3>
                        <p className="text-[13px] text-zinc-400 leading-relaxed">Allow people without Google accounts to add things to your list. Use the <strong>Create a Sharing Link</strong> tool in the Console to generate a secure URL. Anything they type into that web page will instantly appear in your shared Google Tasks folder.</p>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            )}

            {activeTab === 'console' && (
              <div className="space-y-4 animate-fadeIn">
                <section className="relative overflow-hidden rounded-[2rem] border border-white/5 bg-[#111113] bg-grid-dark flex flex-col items-center text-center px-6 py-12 md:py-20">
                  <div className="absolute inset-x-0 top-0 h-px bg-gradient-to-r from-transparent via-lime-400/40 to-transparent animate-scan" />
                  
                  <div className="flex items-center gap-2 mb-10">
                    <span className="w-2 h-2 rounded-full bg-lime-400"></span>
                    <span className="font-mono text-[10px] uppercase tracking-[0.2em] text-lime-400 font-bold">Agent Online</span>
                  </div>
                  
                  <div className="relative w-28 h-28 mb-12">
                    <div className="absolute inset-0 rounded-full border border-lime-400/20" />
                    <div className="absolute inset-4 rounded-full border border-lime-400/10" />
                    <div className="absolute inset-8 rounded-full bg-lime-400 animate-glow-pulse shadow-[0_0_40px_rgba(132,204,22,0.3)]" />
                  </div>
                  
                  <h1 className="text-3xl md:text-[2.5rem] font-bold text-white tracking-tight mb-8">Your workspace, <span className="text-lime-400">autonomously sorted</span>.</h1>
                  
                  <button onClick={handleRun} disabled={isRunning} className="group flex items-center gap-3 px-8 py-3.5 bg-lime-400 hover:bg-lime-300 text-zinc-950 text-sm font-bold rounded-full transition-all disabled:opacity-50 uppercase tracking-wide">
                    <span className="w-2 h-2 rounded-full bg-zinc-950"></span>
                    {isRunning ? 'Processing...' : 'Run Agent'}
                    <span className="font-mono text-xs opacity-70">↵</span>
                  </button>

                  <div className="font-mono text-[9px] uppercase tracking-[0.2em] text-zinc-500 mt-6">
                    LAST RUN · {formatTimeAgo(liveMetrics.lastSync)}
                  </div>
                </section>
                
                <StatGrid liveMetrics={liveMetrics} />
                
                <div className="grid grid-cols-1 gap-4">
                  <section className="relative overflow-hidden rounded-2xl border border-white/5 bg-[#111113] p-6">
                    <h3 className="font-mono text-[11px] uppercase tracking-[0.2em] font-bold text-zinc-300 mb-3">Create a Sharing Link</h3>
                    <p className="text-xs text-zinc-500 mb-4 max-w-2xl">Generate a secure web link so family or colleagues can add tasks directly to your shared list. They do not need an app or an account.</p>
                    <div className="mb-4">
                      <span className="inline-block border border-blue-900/50 text-blue-500 bg-blue-950/30 px-2.5 py-1 rounded text-[9px] font-mono uppercase tracking-[0.1em]">Target: {liveMetrics.sharedList}</span>
                    </div>
                    
                    <div className="space-y-3 max-w-2xl">
                      <div className="flex gap-2">
                        <input type="text" value={guestName} onChange={e => setGuestName(e.target.value)} placeholder="Enter their name (e.g., Wife, Co-worker)" className="flex-1 bg-[#0a0a0b] border border-white/5 rounded-lg px-4 py-2.5 text-[13px] text-white placeholder:text-zinc-600 focus:border-lime-400/30 outline-none font-mono" />
                        <button onClick={handleGenerateLink} disabled={!guestName.trim()} className="px-5 py-2.5 bg-[#1a1a1c] border border-white/5 text-zinc-400 font-mono font-bold rounded-lg text-[10px] uppercase tracking-wider hover:bg-lime-400 hover:text-black hover:border-lime-400 disabled:pointer-events-none transition-all">Create Link</button>
                      </div>
                      
                      <div className="flex gap-2">
                        <input type="text" readOnly value={generatedUrl} placeholder="Secure link will generate here..." className="flex-1 bg-[#0a0a0b] border border-white/5 rounded-lg px-4 py-2.5 text-[13px] text-zinc-400 outline-none font-mono placeholder:text-zinc-700 min-w-0" />
                        <button onClick={() => { navigator.clipboard.writeText(generatedUrl); setCopied(true); setTimeout(() => setCopied(false), 1500); }} disabled={!generatedUrl} className="px-5 py-2.5 bg-[#1a1a1c] border border-white/5 text-zinc-400 font-mono font-bold rounded-lg text-[10px] uppercase tracking-wider hover:bg-white/10 hover:text-white disabled:pointer-events-none transition-all w-[90px]">
                           {copied ? 'Copied' : 'Copy'}
                        </button>
                      </div>
                    </div>
                  </section>
                </div>
                
                <section className="relative overflow-hidden rounded-2xl border border-white/5 bg-[#0a0a0b]">
                  <div className="px-6 py-4 border-b border-white/5 flex justify-between items-center">
                    <span className="text-[11px] font-mono font-bold uppercase tracking-[0.2em] text-zinc-300">Activity Monitor</span>
                    <span className="text-zinc-600 tracking-wider font-mono text-[9px]">{logs.length} EVENTS LOGGED</span>
                  </div>
                  <div className="terminal-scroll h-64 overflow-y-auto px-6 py-5 space-y-2 font-mono text-[11px] leading-relaxed">
                    {logs.map((log, i) => (
                      <div key={i} className="flex gap-4">
                        <span className="text-zinc-700 select-none shrink-0">{String(i + 1).padStart(3, '0')}</span>
                        <span className="text-zinc-600 shrink-0">[{log.time}]</span>
                        <span className={log.type === 'success' ? 'text-lime-400' : log.type === 'warning' ? 'text-amber-400' : log.type === 'error' ? 'text-red-400' : 'text-zinc-300'}>{log.text}</span>
                      </div>
                    ))}
                    <div className="flex gap-4">
                      <span className="text-zinc-700">{String(logs.length + 1).padStart(3, '0')}</span>
                      <span className="text-lime-400 animate-pulse">▌</span>
                    </div>
                  </div>
                </section>
              </div>
            )}

            {activeTab === 'settings' && (
              <div className="space-y-4 animate-fadeIn">
                <form onSubmit={handleSaveConfig} className="rounded-2xl border border-white/5 bg-[#111113] p-6 md:p-8 space-y-6">
                  <div>
                    <h3 className="font-mono text-[12px] uppercase tracking-[0.2em] font-bold text-zinc-300 mb-2">General Settings</h3>
                    <p className="text-[13px] text-zinc-500">Set up how the AI connects to your Google Tasks account and Calendar.</p>
                  </div>
                  
                  <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div className="relative">
                      <label className="block font-mono text-[9px] uppercase tracking-[0.1em] text-zinc-500 mb-3">Input List (Where you dump raw tasks)</label>
                      <select value={inputListName} onChange={e => setInputListName(e.target.value)} className="w-full bg-[#0a0a0b] border border-white/5 rounded-lg px-4 py-3 text-[13px] text-white font-mono focus:border-lime-400/30 outline-none cursor-pointer">
                        {liveMetrics.allLists && liveMetrics.allLists.map(list => (
                          <option key={list} value={list}>{list}</option>
                        ))}
                      </select>
                      <Icon name="chevron-down" className="w-4 h-4 text-zinc-500 absolute right-4 top-10 pointer-events-none" />
                    </div>
                    <div className="relative">
                      <label className="block font-mono text-[9px] uppercase tracking-[0.1em] text-zinc-500 mb-3">Guest List (Where shared tasks go)</label>
                      <select value={sharedListName} onChange={e => setSharedListName(e.target.value)} className="w-full bg-[#0a0a0b] border border-white/5 rounded-lg px-4 py-3 text-[13px] text-white font-mono focus:border-lime-400/30 outline-none cursor-pointer">
                        {liveMetrics.allLists && liveMetrics.allLists.map(list => (
                          <option key={list} value={list}>{list}</option>
                        ))}
                      </select>
                      <Icon name="chevron-down" className="w-4 h-4 text-zinc-500 absolute right-4 top-10 pointer-events-none" />
                    </div>
                    <div>
                      <label className="block font-mono text-[9px] uppercase tracking-[0.1em] text-zinc-500 mb-3">Country Code (For holiday checks)</label>
                      <input type="text" value={countryCode} maxLength={2} onChange={e => setCountryCode(e.target.value.toUpperCase())} className="w-full bg-[#0a0a0b] border border-white/5 rounded-lg px-4 py-3 text-[13px] text-white font-mono focus:border-lime-400/30 outline-none" />
                    </div>
                  </div>
                  <button 
                    type="submit" 
                    disabled={saveStatus === 'saved'}
                    className={`px-6 py-3 font-bold rounded-lg text-[10px] font-mono uppercase tracking-wider transition-all ${saveStatus === 'saved' ? 'bg-lime-400 text-zinc-950' : 'bg-white text-zinc-950 hover:bg-zinc-200'}`}
                  >
                    {saveStatus === 'saved' ? 'Saved Successfully' : 'Save Settings'}
                  </button>
                </form>

                <section className="rounded-2xl border border-white/5 bg-[#111113] p-6 md:p-8 flex flex-col sm:flex-row items-start sm:items-center justify-between gap-6">
                  <div>
                    <h3 className="font-mono text-[12px] uppercase tracking-[0.2em] font-bold text-zinc-300 mb-2">Background Autopilot</h3>
                    <p className="text-[13px] text-zinc-500">{autopilot ? "Active. The AI automatically sorts your tasks in the background every hour." : "Paused. The AI will only sort tasks when you manually click 'Run Agent'."}</p>
                  </div>
                  <button onClick={handleAutopilotToggle} className={`shrink-0 px-6 py-3 rounded-full font-mono text-[10px] uppercase tracking-widest font-bold transition-all ${autopilot ? 'bg-lime-400 text-zinc-950' : 'bg-transparent text-zinc-400 border border-white/10 hover:text-white'}`}>
                    {autopilot ? 'Turn Off' : 'Turn On'}
                  </button>
                </section>

                <section className="rounded-2xl border border-white/5 bg-[#111113] p-6 md:p-8 flex flex-col sm:flex-row items-start sm:items-center justify-between gap-6">
                  <div>
                    <h3 className="font-mono text-[12px] uppercase tracking-[0.2em] font-bold text-zinc-300 mb-2">Initialize Google Tasks</h3>
                    <p className="text-[13px] text-zinc-500">Click this to automatically create all the required category folders inside your actual Google Tasks app.</p>
                  </div>
                  <button onClick={handleSetupWorkspace} className="shrink-0 px-6 py-3 border border-white/10 text-zinc-300 hover:text-white rounded-full font-mono text-[10px] uppercase tracking-widest font-bold transition-all hover:bg-white/5">Create Folders</button>
                </section>

                <section className="rounded-2xl border border-red-900/40 bg-[#111113] p-6 md:p-8">
                  <h3 className="font-mono text-[12px] uppercase tracking-[0.2em] font-bold text-red-400 mb-2">Factory Reset</h3>
                  <p className="text-[13px] text-red-500/70 mb-6">Clear the AI's sorting memory and turn off the autopilot. This does not delete any of your actual tasks in Google.</p>
                  <button onClick={handleFactoryReset} className="w-full text-left px-5 py-4 rounded-xl border border-red-900/30 bg-red-950/20 hover:bg-red-950/40 transition-colors font-semibold text-red-400/80 text-[13px]">Reset AI Memory</button>
                </section>
              </div>
            )}

            <footer className="mt-16 pt-6 border-t border-white/5 flex items-center justify-between font-mono text-[9px] uppercase tracking-widest text-zinc-600">
              <span>AI Task Agent · v2.0</span>
              <span className="flex items-center gap-2"><span className="w-1.5 h-1.5 rounded-full bg-lime-400"></span> All systems running</span>
            </footer>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
